<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>素材生成 · 后台数据</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --gold:#D8AB48;--gold-soft:#F0CC6A;--gold-dark:#A57A18;
  --cream:#EDE9E0;--text-mute:#8E8A9C;--text-dim:#5A566A;
  --base-0:#0B0B11;--base-1:#13131A;--base-2:#17171F;--base-3:#1E1E28;
  --border-soft:rgba(255,255,255,.06);--border-line:rgba(255,255,255,.08);
  --green:#7FD89B;--red:#FF7B7B;--blue:#7BB0FF;--orange:#F4A857;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Outfit','PingFang SC',sans-serif;
  background:var(--base-0);color:var(--cream);min-height:100vh;
  background-image:radial-gradient(circle at 15% 15%,rgba(216,171,72,.05) 0%,transparent 50%),radial-gradient(circle at 85% 75%,rgba(123,176,255,.03) 0%,transparent 50%);
  background-attachment:fixed;
}
.container{max-width:1320px;margin:0 auto;padding:32px 28px}
header.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  display:flex;align-items:center;justify-content:center;
  color:var(--base-0);font-weight:700;font-size:1.05rem;
  box-shadow:0 6px 20px rgba(216,171,72,.25);
}
.brand-text h1{font-size:1.18rem;font-weight:600;letter-spacing:.4px;color:var(--cream)}
.brand-text p{font-size:.75rem;color:var(--text-mute);margin-top:2px}
.user-bar{display:flex;align-items:center;gap:12px;font-size:.8rem;color:var(--text-mute)}
.user-bar .email{color:var(--cream);font-weight:500}
.btn{
  padding:9px 16px;border-radius:10px;border:1px solid var(--border-line);
  background:var(--base-2);color:var(--cream);font-family:inherit;font-size:.8125rem;
  cursor:pointer;transition:.2s;font-weight:500;
}
.btn:hover{background:var(--base-3);border-color:rgba(216,171,72,.3)}
.btn-primary{
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  color:var(--base-0);border:none;font-weight:600;
  box-shadow:0 4px 14px rgba(216,171,72,.2);
}
.btn-primary:hover{box-shadow:0 6px 20px rgba(216,171,72,.3);transform:translateY(-1px)}
.btn-sm{padding:6px 12px;font-size:.75rem;border-radius:8px}

/* Login */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
}
.login-card{
  background:var(--base-2);border:1px solid var(--border-line);border-radius:20px;
  padding:40px 36px;width:100%;max-width:400px;
  box-shadow:0 16px 56px rgba(0,0,0,.5);
  text-align:center;
}
.login-card .logo{
  width:60px;height:60px;border-radius:16px;margin:0 auto 18px;
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  display:flex;align-items:center;justify-content:center;
  color:var(--base-0);font-weight:700;font-size:1.4rem;
  box-shadow:0 8px 28px rgba(216,171,72,.3);
}
.login-card h2{font-size:1.15rem;color:var(--gold-soft);margin-bottom:6px;font-weight:600}
.login-card p.sub{color:var(--text-mute);font-size:.8125rem;margin-bottom:24px}
.field{margin-bottom:14px;text-align:left}
.field label{display:block;font-size:.75rem;color:var(--text-mute);margin-bottom:6px;letter-spacing:.4px}
.field input{
  width:100%;padding:12px 14px;border:1px solid var(--border-line);border-radius:10px;
  background:var(--base-3);color:var(--cream);font-family:inherit;font-size:.875rem;
  outline:none;transition:.25s;
}
.field input:focus{border-color:rgba(216,171,72,.5);box-shadow:0 0 0 3px rgba(216,171,72,.1)}
.err-msg{color:var(--red);font-size:.75rem;margin-top:10px;min-height:18px;text-align:left}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{
  background:var(--base-2);border:1px solid var(--border-line);border-radius:14px;
  padding:18px 20px;transition:.25s;
}
.stat-card:hover{border-color:rgba(216,171,72,.25);transform:translateY(-2px)}
.stat-card .label{font-size:.7rem;color:var(--text-mute);letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px}
.stat-card .value{font-size:1.85rem;font-weight:600;color:var(--gold-soft);line-height:1}
.stat-card .delta{font-size:.7rem;color:var(--text-dim);margin-top:6px}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--base-2);padding:4px;border-radius:12px;border:1px solid var(--border-line);margin-bottom:20px;width:fit-content}
.tab{
  padding:9px 18px;border-radius:9px;font-size:.8125rem;color:var(--text-mute);
  cursor:pointer;font-weight:500;transition:.2s;border:none;background:transparent;font-family:inherit;
}
.tab.active{background:var(--base-3);color:var(--gold-soft)}
.tab:hover:not(.active){color:var(--cream)}

/* Filter bar */
.filters{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;
  padding:14px 16px;background:var(--base-2);border:1px solid var(--border-line);border-radius:12px;
}
.filters input,.filters select{
  padding:8px 12px;border:1px solid var(--border-line);border-radius:8px;
  background:var(--base-3);color:var(--cream);font-family:inherit;font-size:.8125rem;
  outline:none;min-width:140px;
}
.filters label{font-size:.7rem;color:var(--text-mute);letter-spacing:.4px}
.filters .spacer{flex:1}

/* Table */
.table-wrap{
  background:var(--base-2);border:1px solid var(--border-line);border-radius:14px;
  overflow:hidden;
}
table{width:100%;border-collapse:collapse;font-size:.8125rem}
thead{background:var(--base-3)}
th{
  text-align:left;padding:13px 16px;font-size:.7rem;color:var(--text-mute);
  letter-spacing:.6px;text-transform:uppercase;font-weight:500;border-bottom:1px solid var(--border-line);
}
td{padding:12px 16px;border-bottom:1px solid var(--border-soft);color:var(--cream)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(216,171,72,.04)}
td .pill{
  display:inline-block;padding:3px 9px;border-radius:6px;font-size:.7rem;
  background:var(--base-3);color:var(--text-mute);
}
td .pill.success{background:rgba(127,216,155,.12);color:var(--green)}
td .pill.failed{background:rgba(255,123,123,.12);color:var(--red)}
td .pill.gold{background:rgba(216,171,72,.12);color:var(--gold-soft)}
td .pill.blue{background:rgba(123,176,255,.12);color:var(--blue)}
.nick{color:var(--gold-soft);font-weight:500}
.mono{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:.72rem;color:var(--text-mute)}
.prompt-cell{max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:help}
.empty{padding:60px 16px;text-align:center;color:var(--text-mute);font-size:.875rem}
.loading{padding:60px 16px;text-align:center;color:var(--text-mute);font-size:.875rem}
.loading::before{content:"⏳ ";margin-right:6px}
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;font-size:.8rem;color:var(--text-mute)}
.pagination button{padding:6px 12px;border-radius:8px;border:1px solid var(--border-line);background:var(--base-2);color:var(--cream);cursor:pointer;font-size:.75rem}
.pagination button:disabled{opacity:.4;cursor:not-allowed}

.section{display:none}
.section.active{display:block}

.tag-chip{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.7rem;margin-right:4px;background:var(--base-3);color:var(--text-mute)}

@media (max-width:880px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .container{padding:20px 16px}
  th,td{padding:10px 12px;font-size:.75rem}
  .prompt-cell{max-width:160px}
}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.section.active{animation:fadeIn .25s ease-out}
</style>
</head>
<body>

<!-- Login -->
<div id="loginView" class="login-wrap">
  <div class="login-card">
    <div class="logo">SD</div>
    <h2>素材生成 · 后台</h2>
    <p class="sub">仅限管理员登录</p>
    <div class="field">
      <label>邮箱</label>
      <input id="loginEmail" type="email" placeholder="admin@example.com" autocomplete="username"/>
    </div>
    <div class="field">
      <label>密码</label>
      <input id="loginPwd" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary" id="btnLogin" style="width:100%;margin-top:6px">登录</button>
    <div class="err-msg" id="loginErr"></div>
  </div>
</div>

<!-- Main -->
<div id="mainView" class="container" style="display:none">
  <header class="top">
    <div class="brand">
      <div class="brand-icon">SD</div>
      <div class="brand-text">
        <h1>素材生成 · 数据后台</h1>
        <p>使用记录 · 用户分析 · 操作留痕</p>
      </div>
    </div>
    <div class="user-bar">
      <span id="adminEmail" class="email">—</span>
      <button class="btn btn-sm" id="btnRefresh">刷新</button>
      <button class="btn btn-sm" id="btnLogout">退出</button>
    </div>
  </header>

  <div class="stats-grid">
    <div class="stat-card"><div class="label">总用户数</div><div class="value" id="statUsers">—</div><div class="delta" id="statUsersDelta"></div></div>
    <div class="stat-card"><div class="label">总操作数</div><div class="value" id="statEvents">—</div><div class="delta">所有事件累计</div></div>
    <div class="stat-card"><div class="label">今日操作</div><div class="value" id="statToday">—</div><div class="delta" id="statTodayDelta"></div></div>
    <div class="stat-card"><div class="label">本周生成图片</div><div class="value" id="statGenWeek">—</div><div class="delta">最近 7 天 · success</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-sec="events">操作记录</button>
    <button class="tab" data-sec="users">用户列表</button>
    <button class="tab" data-sec="overview">服务商分布</button>
  </div>

  <!-- Section: Events -->
  <div class="section active" id="sec-events">
    <div class="filters">
      <label>事件类型</label>
      <select id="filterType">
        <option value="">全部</option>
        <option value="visit">访问</option>
        <option value="generate">生成</option>
        <option value="upload">上传素材</option>
        <option value="save_to_gallery">存入素材库</option>
      </select>
      <label>状态</label>
      <select id="filterStatus">
        <option value="">全部</option>
        <option value="success">成功</option>
        <option value="failed">失败</option>
      </select>
      <label>用户</label>
      <input id="filterNick" type="text" placeholder="昵称关键字"/>
      <label>关键词</label>
      <input id="filterPrompt" type="text" placeholder="Prompt 关键字"/>
      <div class="spacer"></div>
      <button class="btn btn-sm" id="btnExportCsv">导出 CSV</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:160px">时间</th>
            <th style="width:140px">昵称</th>
            <th style="width:100px">事件</th>
            <th style="width:110px">服务商</th>
            <th style="width:90px">状态</th>
            <th>Prompt / 备注</th>
          </tr>
        </thead>
        <tbody id="eventsBody">
          <tr><td colspan="6" class="loading">加载中…</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <button id="evPrev">上一页</button>
      <span id="evPageInfo">—</span>
      <button id="evNext">下一页</button>
    </div>
  </div>

  <!-- Section: Users -->
  <div class="section" id="sec-users">
    <div class="filters">
      <label>搜索</label>
      <input id="userSearch" type="text" placeholder="昵称关键字"/>
      <div class="spacer"></div>
      <span style="font-size:.75rem;color:var(--text-mute)" id="userCount"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>昵称</th>
            <th>设备 ID</th>
            <th>首次访问</th>
            <th>最近活跃</th>
            <th>操作数</th>
            <th>成功生成</th>
          </tr>
        </thead>
        <tbody id="usersBody">
          <tr><td colspan="6" class="loading">加载中…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Section: Overview -->
  <div class="section" id="sec-overview">
    <div class="stats-grid" style="margin-bottom:0">
      <div class="stat-card"><div class="label">即梦 Jimeng</div><div class="value" id="prov-jimeng">—</div><div class="delta">成功生成次数</div></div>
      <div class="stat-card"><div class="label">Google Gemini</div><div class="value" id="prov-gemini">—</div><div class="delta">成功生成次数</div></div>
      <div class="stat-card"><div class="label">通义千问</div><div class="value" id="prov-qwen">—</div><div class="delta">成功生成次数</div></div>
      <div class="stat-card"><div class="label">OpenAI 兼容</div><div class="value" id="prov-openai">—</div><div class="delta">成功生成次数</div></div>
    </div>
    <div class="table-wrap" style="margin-top:20px">
      <table>
        <thead><tr><th>用户</th><th>成功</th><th>失败</th><th>成功率</th><th>最近一次</th></tr></thead>
        <tbody id="leaderboardBody"><tr><td colspan="5" class="loading">加载中…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL="https://pznlbrtormfulrhmukwv.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6bmxicnRvcm1mdWxyaG11a3d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NTg5NjQsImV4cCI6MjA5NDIzNDk2NH0.w8nUGu9AfAewGM3c8UDUCEIkKN5EtclZa1R1rNTNaIw";

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth:{persistSession:true,autoRefreshToken:true}
});

const $ = s=>document.querySelector(s);
const PAGE_SIZE = 50;
let evPage = 0;
let evFilters = {};
let allUsers = [];

/* ================= Auth ================= */
async function checkAuth(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){
    showMain(session.user);
  }else{
    $("#loginView").style.display="flex";
    $("#mainView").style.display="none";
  }
}

$("#btnLogin").onclick = async ()=>{
  const email = $("#loginEmail").value.trim();
  const pwd = $("#loginPwd").value;
  $("#loginErr").textContent="";
  if(!email||!pwd){$("#loginErr").textContent="请输入邮箱和密码";return}
  $("#btnLogin").disabled=true;$("#btnLogin").textContent="登录中…";
  const { data, error } = await sb.auth.signInWithPassword({email,password:pwd});
  $("#btnLogin").disabled=false;$("#btnLogin").textContent="登录";
  if(error){$("#loginErr").textContent=error.message||"登录失败";return}
  showMain(data.user);
};

$("#loginPwd").addEventListener("keydown",e=>{if(e.key==="Enter")$("#btnLogin").click()});

$("#btnLogout").onclick = async ()=>{
  await sb.auth.signOut();
  location.reload();
};

function showMain(user){
  $("#loginView").style.display="none";
  $("#mainView").style.display="block";
  $("#adminEmail").textContent = user.email || "管理员";
  loadAll();
}

$("#btnRefresh").onclick = ()=>loadAll();

/* ================= Tabs ================= */
document.querySelectorAll(".tab").forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    $("#sec-"+t.dataset.sec).classList.add("active");
  };
});

/* ================= Load ================= */
async function loadAll(){
  await Promise.all([loadStats(), loadEvents(), loadUsers(), loadOverview()]);
}

async function loadStats(){
  const today = new Date(); today.setHours(0,0,0,0);
  const weekAgo = new Date(Date.now()-7*24*3600*1000);

  const [u, ev, tev, gen] = await Promise.all([
    sb.from("tracker_users").select("*",{count:"exact",head:true}),
    sb.from("tracker_events").select("*",{count:"exact",head:true}),
    sb.from("tracker_events").select("*",{count:"exact",head:true}).gte("created_at", today.toISOString()),
    sb.from("tracker_events").select("*",{count:"exact",head:true})
      .eq("event_type","generate").eq("status","success")
      .gte("created_at", weekAgo.toISOString())
  ]);
  $("#statUsers").textContent = u.count ?? 0;
  $("#statEvents").textContent = ev.count ?? 0;
  $("#statToday").textContent = tev.count ?? 0;
  $("#statGenWeek").textContent = gen.count ?? 0;

  // delta: today vs yesterday
  const yest = new Date(today.getTime()-24*3600*1000);
  const yev = await sb.from("tracker_events").select("*",{count:"exact",head:true})
    .gte("created_at", yest.toISOString()).lt("created_at", today.toISOString());
  const diff = (tev.count||0) - (yev.count||0);
  $("#statTodayDelta").textContent = diff>=0?`比昨日 +${diff}`:`比昨日 ${diff}`;
}

async function loadEvents(){
  let q = sb.from("tracker_events").select("*",{count:"exact"})
    .order("created_at",{ascending:false})
    .range(evPage*PAGE_SIZE, evPage*PAGE_SIZE+PAGE_SIZE-1);
  if(evFilters.type) q = q.eq("event_type", evFilters.type);
  if(evFilters.status) q = q.eq("status", evFilters.status);
  if(evFilters.nick) q = q.ilike("nickname", `%${evFilters.nick}%`);
  if(evFilters.prompt) q = q.ilike("prompt_preview", `%${evFilters.prompt}%`);
  const { data, error, count } = await q;
  const tbody = $("#eventsBody");
  if(error){tbody.innerHTML=`<tr><td colspan="6" class="empty">加载失败：${error.message}</td></tr>`;return}
  if(!data||!data.length){tbody.innerHTML=`<tr><td colspan="6" class="empty">暂无数据</td></tr>`;}
  else {
    tbody.innerHTML = data.map(rowToEventTr).join("");
  }
  const total = count||0;
  const totalPages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  $("#evPageInfo").textContent = `第 ${evPage+1} / ${totalPages} 页 · 共 ${total} 条`;
  $("#evPrev").disabled = evPage===0;
  $("#evNext").disabled = evPage>=totalPages-1;
}

function rowToEventTr(r){
  const t = new Date(r.created_at);
  const time = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")} ${String(t.getHours()).padStart(2,"0")}:${String(t.getMinutes()).padStart(2,"0")}`;
  const evMap = {"generate":"生成","upload":"上传","visit":"访问","save_to_gallery":"存素材"};
  const evClass = {"generate":"gold","upload":"blue","visit":"","save_to_gallery":"success"};
  const ev = `<span class="pill ${evClass[r.event_type]||""}">${evMap[r.event_type]||r.event_type}</span>`;
  const provMap = {"jimeng":"即梦","gemini":"Gemini","qwen":"千问","openai":"OpenAI"};
  const prov = r.provider ? `<span class="pill">${provMap[r.provider]||r.provider}</span>` : '<span class="mono">—</span>';
  let st = '<span class="mono">—</span>';
  if(r.status==="success") st = '<span class="pill success">成功</span>';
  else if(r.status==="failed") st = '<span class="pill failed">失败</span>';
  const prompt = r.prompt_preview || r.error_msg || (r.meta ? JSON.stringify(r.meta) : "");
  const promptCell = prompt ? `<span class="prompt-cell" title="${esc(prompt)}">${esc(prompt)}</span>` : '<span class="mono">—</span>';
  return `<tr>
    <td class="mono">${time}</td>
    <td class="nick">${esc(r.nickname||"未命名")}</td>
    <td>${ev}</td>
    <td>${prov}</td>
    <td>${st}</td>
    <td>${promptCell}</td>
  </tr>`;
}

function esc(s){return String(s||"").replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;","\"":"&quot;"}[c]))}

$("#filterType").onchange = ()=>{evFilters.type=$("#filterType").value;evPage=0;loadEvents()};
$("#filterStatus").onchange = ()=>{evFilters.status=$("#filterStatus").value;evPage=0;loadEvents()};
let nickTimer, promptTimer;
$("#filterNick").oninput = ()=>{clearTimeout(nickTimer);nickTimer=setTimeout(()=>{evFilters.nick=$("#filterNick").value.trim();evPage=0;loadEvents()},350)};
$("#filterPrompt").oninput = ()=>{clearTimeout(promptTimer);promptTimer=setTimeout(()=>{evFilters.prompt=$("#filterPrompt").value.trim();evPage=0;loadEvents()},350)};
$("#evPrev").onclick = ()=>{if(evPage>0){evPage--;loadEvents()}};
$("#evNext").onclick = ()=>{evPage++;loadEvents()};

$("#btnExportCsv").onclick = async ()=>{
  let q = sb.from("tracker_events").select("created_at,nickname,device_id,event_type,provider,model,status,prompt_preview,error_msg")
    .order("created_at",{ascending:false}).limit(5000);
  if(evFilters.type) q = q.eq("event_type", evFilters.type);
  if(evFilters.status) q = q.eq("status", evFilters.status);
  if(evFilters.nick) q = q.ilike("nickname", `%${evFilters.nick}%`);
  if(evFilters.prompt) q = q.ilike("prompt_preview", `%${evFilters.prompt}%`);
  const { data, error } = await q;
  if(error){alert("导出失败："+error.message);return}
  const header = ["时间","昵称","设备ID","事件","服务商","模型","状态","Prompt","错误"];
  const rows = (data||[]).map(r=>[
    r.created_at, r.nickname, r.device_id, r.event_type, r.provider, r.model, r.status,
    (r.prompt_preview||"").replace(/\n/g," "), r.error_msg||""
  ]);
  const csv = [header, ...rows].map(r=>r.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url;a.download=`tracker-events-${new Date().toISOString().slice(0,10)}.csv`;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
};

/* ================= Users ================= */
async function loadUsers(){
  const { data:users, error } = await sb.from("tracker_users").select("*").order("last_seen",{ascending:false}).limit(500);
  if(error){$("#usersBody").innerHTML=`<tr><td colspan="6" class="empty">加载失败：${error.message}</td></tr>`;return}

  // get event counts per device
  const { data:counts } = await sb.from("tracker_events")
    .select("device_id,event_type,status").limit(5000);
  const stats = {};
  (counts||[]).forEach(c=>{
    if(!stats[c.device_id]) stats[c.device_id]={total:0,gen:0};
    stats[c.device_id].total++;
    if(c.event_type==="generate"&&c.status==="success") stats[c.device_id].gen++;
  });

  allUsers = (users||[]).map(u=>({
    ...u,
    total: stats[u.device_id]?.total||0,
    gen: stats[u.device_id]?.gen||0
  }));
  renderUsers();
}

function renderUsers(){
  const kw = $("#userSearch").value.trim().toLowerCase();
  const filtered = kw ? allUsers.filter(u=>(u.nickname||"").toLowerCase().includes(kw)) : allUsers;
  $("#userCount").textContent = `共 ${filtered.length} 位用户`;
  if(!filtered.length){$("#usersBody").innerHTML=`<tr><td colspan="6" class="empty">暂无数据</td></tr>`;return}
  $("#usersBody").innerHTML = filtered.map(u=>{
    const first = u.created_at ? fmtDate(u.created_at) : "—";
    const last = u.last_seen ? fmtDate(u.last_seen) : "—";
    return `<tr>
      <td class="nick">${esc(u.nickname||"未命名")}</td>
      <td class="mono" title="${esc(u.device_id)}">${esc((u.device_id||"").slice(0,18))}…</td>
      <td class="mono">${first}</td>
      <td class="mono">${last}</td>
      <td><span class="pill">${u.total}</span></td>
      <td><span class="pill gold">${u.gen}</span></td>
    </tr>`;
  }).join("");
}

$("#userSearch").oninput = renderUsers;

function fmtDate(s){
  const d = new Date(s);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

/* ================= Overview ================= */
async function loadOverview(){
  const { data } = await sb.from("tracker_events").select("provider,status,nickname,device_id,created_at")
    .eq("event_type","generate").limit(5000);
  const provSuccess = {jimeng:0,gemini:0,qwen:0,openai:0};
  const byUser = {};
  (data||[]).forEach(r=>{
    if(r.status==="success" && r.provider && provSuccess.hasOwnProperty(r.provider)) provSuccess[r.provider]++;
    const key = r.nickname||r.device_id||"未命名";
    if(!byUser[key]) byUser[key]={nick:r.nickname||"未命名",success:0,failed:0,last:r.created_at};
    if(r.status==="success") byUser[key].success++;
    else if(r.status==="failed") byUser[key].failed++;
    if(r.created_at > byUser[key].last) byUser[key].last = r.created_at;
  });
  $("#prov-jimeng").textContent = provSuccess.jimeng;
  $("#prov-gemini").textContent = provSuccess.gemini;
  $("#prov-qwen").textContent = provSuccess.qwen;
  $("#prov-openai").textContent = provSuccess.openai;

  const rows = Object.values(byUser).sort((a,b)=>b.success-a.success).slice(0,30);
  if(!rows.length){$("#leaderboardBody").innerHTML=`<tr><td colspan="5" class="empty">暂无数据</td></tr>`;return}
  $("#leaderboardBody").innerHTML = rows.map(r=>{
    const total = r.success+r.failed;
    const rate = total ? Math.round(r.success/total*100) : 0;
    return `<tr>
      <td class="nick">${esc(r.nick)}</td>
      <td><span class="pill success">${r.success}</span></td>
      <td><span class="pill failed">${r.failed}</span></td>
      <td>${rate}%</td>
      <td class="mono">${fmtDate(r.last)}</td>
    </tr>`;
  }).join("");
}
